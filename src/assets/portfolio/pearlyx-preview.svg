    <rect x="47" y="129" width="37" height="37" rx="9" fill="url(#brand)"/>
    <path d="M58 149l9-8 9 8v12h-6v-8h-6v8h-6z" fill="#ffffff"/>
    <text x="98" y="151" fill="#ec2f7f">Home</text>

    <g transform="translate(47 216)">
      <rect width="37" height="37" rx="9" fill="#fff4f8"/>
      <circle cx="17" cy="17" r="7" fill="none" stroke="#171b22" stroke-width="2"/>
      <path d="m23 23 6 6" stroke="#171b22" stroke-width="2" stroke-linecap="round"/>
      <text x="51" y="24">Search</text>
    </g>
    <g transform="translate(47 278)">
      <rect width="37" height="37" rx="9" fill="#fff4f8"/>
      <circle cx="18" cy="18" r="8" fill="none" stroke="#171b22" stroke-width="2"/>
      <path d="m14 22 9-9" stroke="#171b22" stroke-width="2" stroke-linecap="round"/>
