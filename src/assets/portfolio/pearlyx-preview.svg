      <circle cx="32" cy="32" r="27" fill="#77b9d3"/>
      <path d="M15 48c22-20 34-18 43 0z" fill="#335b45"/>
      <path d="M31 43V15M31 27l-14-8M31 28l17-10" stroke="#22422f" stroke-width="3"/>
