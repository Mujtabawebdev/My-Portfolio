    <g transform="translate(944 174)">
      <circle cx="32" cy="32" r="34" fill="none" stroke="url(#story)" stroke-width="4"/>
      <circle cx="32" cy="32" r="27" fill="#edc2c1"/>
      <path d="M30 19 44 31 30 43z" fill="#ffffff" opacity="0.7"/>
