  <rect x="304" y="285" width="814" height="330" rx="22" fill="#fffafd" fill-opacity="0.75" stroke="#ffffff" filter="url(#shadow)"/>
  <rect x="658" y="338" width="90" height="78" rx="18" fill="#ffcade" filter="url(#shadow)"/>
  <rect x="675" y="352" width="55" height="43" rx="9" fill="#fff0f5"/>
  <circle cx="693" cy="369" r="7" fill="#ef5c8c"/>
  <path d="M681 393 697 373l18 20z" fill="#ff9fb4"/>
  <text x="642" y="457" fill="#171b22" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="900">No posts yet</text>
  <text x="581" y="489" fill="#6a7480" font-family="Inter, Arial, sans-serif" font-size="15">Looks like your feed is a little quiet right now.</text>
  <text x="586" y="511" fill="#6a7480" font-family="Inter, Arial, sans-serif" font-size="15">Share your first post and start your journey!</text>
  <rect x="595" y="537" width="232" height="45" rx="8" fill="url(#brand)"/>
  <path d="M629 552v16M621 560h16" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <text x="657" y="564" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="900">Create your first post</text>
