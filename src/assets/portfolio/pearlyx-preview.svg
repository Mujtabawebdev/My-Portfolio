      <circle cx="15" cy="15" r="5" fill="none" stroke="#171b22" stroke-width="2"/>
      <circle cx="25" cy="14" r="4" fill="none" stroke="#171b22" stroke-width="2"/>
      <path d="M8 29c2-6 12-6 15 0M20 29c1-4 8-4 10 0" fill="none" stroke="#171b22" stroke-width="2" stroke-linecap="round"/>
      <text x="51" y="24">People</text>
