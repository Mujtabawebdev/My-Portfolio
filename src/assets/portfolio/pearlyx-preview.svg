<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">PearlyX Instagram clone preview</title>
  <desc id="desc">A soft pink Instagram clone dashboard preview with sidebar navigation, stories, profile badge, and empty feed state.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffe4ee"/>
      <stop offset="0.45" stop-color="#fff8f2"/>
      <stop offset="1" stop-color="#ffd1ec"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ec2f7f"/>
      <stop offset="1" stop-color="#ff8a22"/>
    </linearGradient>
    <linearGradient id="story" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#df2f85"/>
      <stop offset="0.56" stop-color="#ff4a58"/>
      <stop offset="1" stop-color="#ff941f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#d55a8c" flood-opacity="0.18"/>
    </filter>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="152" cy="72" r="116" fill="#ffffff" opacity="0.38" filter="url(#soft)"/>
  <circle cx="1120" cy="96" r="150" fill="#f5d8ff" opacity="0.45" filter="url(#soft)"/>
  <circle cx="1020" cy="628" r="150" fill="#ffc3e5" opacity="0.5" filter="url(#soft)"/>

  <rect x="22" y="24" width="238" height="628" rx="22" fill="#fff5f7" fill-opacity="0.78" stroke="#ffffff" stroke-opacity="0.75" filter="url(#shadow)"/>
  <rect x="47" y="51" width="37" height="37" rx="10" fill="url(#brand)"/>
  <text x="59" y="76" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="900">PX</text>
  <text x="98" y="76" fill="#171b22" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="900">PearlyX</text>

  <g font-family="Inter, Arial, sans-serif" font-size="17" font-weight="850" fill="#171b22">
