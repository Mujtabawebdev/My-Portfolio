    </g>
    <g transform="translate(728 174)">
      <circle cx="32" cy="32" r="34" fill="none" stroke="url(#story)" stroke-width="4"/>
      <circle cx="32" cy="32" r="27" fill="#68422f"/>
      <ellipse cx="32" cy="30" rx="19" ry="13" fill="#f3e1c9"/>
      <path d="M21 29c8 8 17 8 24 0" fill="none" stroke="#c6915f" stroke-width="3"/>
      <text x="2" y="88">Coffee Time</text>
    </g>
    <g transform="translate(836 174)">
      <circle cx="32" cy="32" r="34" fill="none" stroke="url(#story)" stroke-width="4"/>
      <circle cx="32" cy="32" r="27" fill="#8557ad"/>
      <path d="M6 48h52L42 28 30 39 21 32z" fill="#f28a42"/>
