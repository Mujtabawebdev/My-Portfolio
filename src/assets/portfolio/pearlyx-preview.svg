  <text x="1118" y="88" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="900">M</text>

  <g font-family="Inter, Arial, sans-serif" font-size="13" font-weight="750" fill="#171b22">
