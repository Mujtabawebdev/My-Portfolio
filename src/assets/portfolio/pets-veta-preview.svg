<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Pets Veta website preview</title>
  <desc id="desc">A portfolio preview inspired by the Pets Veta homepage with navigation, headline, call to action buttons, and pet artwork.</desc>
  <defs>
    <linearGradient id="page" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f9ffff"/>
      <stop offset="1" stop-color="#eefbfb"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#54d3cc"/>
      <stop offset="1" stop-color="#059f9d"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0c3f47" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#page)"/>
  <rect width="1200" height="88" fill="#ffffff"/>
  <line x1="0" y1="88" x2="1200" y2="88" stroke="#e7eeee"/>

  <g transform="translate(31 22)">
    <circle cx="24" cy="24" r="22" fill="#ffffff" stroke="#0b8291" stroke-width="2"/>
    <circle cx="17" cy="20" r="4" fill="#0b8291"/>
    <circle cx="31" cy="20" r="4" fill="#0b8291"/>
    <path d="M15 32c7 7 18 7 25 0" fill="none" stroke="#0b8291" stroke-width="3" stroke-linecap="round"/>
    <text x="58" y="19" fill="#005b8c" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">PetsVeta</text>
    <text x="58" y="45" fill="#050b16" font-family="Inter, Arial, sans-serif" font-size="16">Care, Connect, Cure</text>
  </g>

  <g fill="#263348" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">
    <text x="304" y="51" fill="#009f9d">Home</text>
    <text x="382" y="51">Marketplace</text>
    <text x="506" y="51">Services</text>
    <text x="604" y="51">Doctors</text>
    <text x="699" y="51">AI Assistant</text>
    <text x="833" y="51">About</text>
    <text x="914" y="51">Contact</text>
  </g>

  <rect x="1010" y="26" width="70" height="36" rx="9" fill="#ffffff" stroke="#0d9aa2"/>
  <text x="1022" y="50" fill="#087c8c" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Login</text>
  <rect x="1092" y="26" width="86" height="36" rx="9" fill="#16969a"/>
  <text x="1110" y="50" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Register</text>

  <g filter="url(#softShadow)">
    <rect x="60" y="112" width="272" height="54" rx="27" fill="#ffffff"/>
    <text x="100" y="147" fill="#07162a" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">Trusted by 10,000+ pet parents</text>
    <circle cx="82" cy="139" r="5" fill="#0ba7a8"/>
    <circle cx="74" cy="132" r="4" fill="#0ba7a8"/>
    <circle cx="90" cy="132" r="4" fill="#0ba7a8"/>
  </g>

  <g font-family="Inter, Arial, sans-serif" font-weight="900">
    <text x="60" y="273" fill="#07162a" font-size="64">Better care for</text>
    <text x="60" y="354" fill="#07162a" font-size="64">your pets,</text>
    <text x="454" y="354" fill="#0aa9a9" font-size="64">every</text>
    <text x="60" y="435" fill="#0aa9a9" font-size="64">day.</text>
  </g>
  <text x="60" y="504" fill="#203150" font-family="Inter, Arial, sans-serif" font-size="21">
    <tspan x="60" dy="0">PetsVeta is your all-in-one platform for expert care, trusted vets,</tspan>
    <tspan x="60" dy="34">quality products and a loving community.</tspan>
  </text>

  <rect x="60" y="580" width="250" height="50" rx="8" fill="#0aa6a5"/>
  <text x="92" y="612" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Book a Vet Appointment</text>
  <rect x="330" y="580" width="218" height="50" rx="8" fill="#ffffff" filter="url(#softShadow)"/>
  <text x="362" y="612" fill="#08162b" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Explore Marketplace</text>

  <circle cx="872" cy="423" r="226" fill="url(#teal)"/>
  <g transform="translate(696 238)">
    <ellipse cx="148" cy="205" rx="94" ry="154" fill="#d88728"/>
    <ellipse cx="148" cy="210" rx="71" ry="118" fill="#e9a443"/>
    <ellipse cx="74" cy="152" rx="32" ry="82" fill="#c77625" transform="rotate(15 74 152)"/>
    <ellipse cx="220" cy="152" rx="32" ry="82" fill="#c77625" transform="rotate(-15 220 152)"/>
    <circle cx="124" cy="137" r="11" fill="#1c1712"/>
    <circle cx="173" cy="137" r="11" fill="#1c1712"/>
    <ellipse cx="148" cy="173" rx="20" ry="16" fill="#3b2118"/>
    <path d="M129 205c16 18 35 18 50 0" fill="none" stroke="#5a2a1d" stroke-width="7" stroke-linecap="round"/>
    <path d="M146 190c0 30 15 49 32 50 14-18 8-45-18-54z" fill="#ef7f86"/>
  </g>
  <g transform="translate(886 364)">
    <ellipse cx="88" cy="116" rx="80" ry="92" fill="#b8aea0"/>
    <circle cx="88" cy="72" r="68" fill="#c8beb2"/>
    <path d="M33 33 16 0 63 22z" fill="#b8aea0"/>
    <path d="M144 33 161 0 114 22z" fill="#b8aea0"/>
    <circle cx="62" cy="66" r="13" fill="#e7dc64"/>
    <circle cx="114" cy="66" r="13" fill="#e7dc64"/>
    <circle cx="62" cy="66" r="6" fill="#111"/>
    <circle cx="114" cy="66" r="6" fill="#111"/>
    <path d="M81 93h14l-7 8z" fill="#6a3a2d"/>
    <path d="M66 112c13 12 30 12 44 0" fill="none" stroke="#6a3a2d" stroke-width="5" stroke-linecap="round"/>
    <g stroke="#82776b" stroke-width="4" stroke-linecap="round" opacity="0.75">
      <path d="M38 83 9 72"/>
      <path d="M40 96 8 96"/>
      <path d="M136 83 168 72"/>
      <path d="M136 96 170 96"/>
    </g>
  </g>
</svg>
